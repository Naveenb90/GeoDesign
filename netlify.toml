# GeoDesign — this branch builds the Astro app under astro/ (static, SEO-first).
# Legacy Vite SPA at repo root is not the Netlify publish target on feat/astro-netlify.

[build]
  command = "cd astro && npm ci && npm run build"
  publish = "astro/dist"

[build.environment]
  NODE_VERSION = "20"

# No SPA catch-all — Astro emits real HTML per path; Netlify serves 404.html for missing routes.
